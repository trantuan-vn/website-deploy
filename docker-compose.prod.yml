name: website-deploy

services:
  payload:
    image: website-deploy:latest
    restart: unless-stopped
    ports:
      - '3001:3000'
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      # Persist uploaded media (Payload writes to public/media) across container
      # recreates. Without this, seeded/uploaded images live only in the
      # container's writable layer and are lost on every `up --force-recreate`.
      - media:/app/public/media

  mongo:
    image: mongo:latest
    restart: unless-stopped
    command:
      - --storageEngine=wiredTiger
    ports:
      # Published to the host so the production image can be built against it
      # (the legacy Docker builder cannot resolve compose service names).
      - '27017:27017'
    volumes:
      - data:/data/db

volumes:
  data:
  media:
