version: '3'

services:
  payload:
    image: node:18-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "yarn install && yarn dev"
    depends_on:
      - mongo
    env_file:
      - .env

  mongo:
    image: docker.io/library/mongo:7
    platform: linux/amd64
    ports:
      - '27017:27017'
    volumes:
      - data:/data/db

volumes:
  data:
  node_modules:
