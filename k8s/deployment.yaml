apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-deploy
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: website-deploy
  template:
    metadata:
      labels:
        app: website-deploy
    spec:
      securityContext:
        fsGroup: 1001
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: fix-media-perms
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              rm -rf /media/lost+found
              chown -R 1001:1001 /media
          volumeMounts:
            - name: media
              mountPath: /media
      containers:
        - name: app
          image: ${OCIR_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: DATABASE_URL
            - name: PAYLOAD_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: PAYLOAD_SECRET
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: CRON_SECRET
            - name: PREVIEW_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-secrets
                  key: PREVIEW_SECRET
            - name: NEXT_PUBLIC_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: website-config
                  key: NEXT_PUBLIC_SERVER_URL
          volumeMounts:
            - name: media
              mountPath: /app/public/media
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: website-media-pvc
